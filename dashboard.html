<!DOCTYPE html>
<html>
<head>
<title>Library Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Library Management System</h1>

<div class="container">

<h2>Add Book</h2>

<input type="text" id="bookName" placeholder="Book Name">
<input type="text" id="authorName" placeholder="Author">
<button onclick="addBook()">Add Book</button>

<h2>Search Book</h2>
<input type="text" id="searchBook" placeholder="Search..." onkeyup="searchBook()">

<h2>Books</h2>

<table>
<thead>
<tr>
<th>Book</th>
<th>Author</th>
<th>Status</th>
<th>Student</th>
<th>Action</th>
</tr>
</thead>

<tbody id="bookList"></tbody>

</table>

<h2>Issue History</h2>

<ul id="historyList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
